services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dogear}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dogear}
      POSTGRES_DB: ${POSTGRES_DB:-dogear}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dogear}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      target: dev
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
